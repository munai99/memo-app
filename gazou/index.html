<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私のアルバム</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

header {
  text-align: center;
  padding: 12px;
  background: white;
  border-bottom: 1px solid #ddd;
}

#list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 6px;
  padding: 10px;
}

.thumb {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid #ddd;
}

.viewer {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.viewer img {
  max-width: 100%;
  max-height: 90%;
}

button {
  padding: 10px 14px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h3>私のアルバム</h3>

  <input type="file" id="file" multiple accept="image/*" style="display:none">

  <button onclick="document.getElementById('file').click()">
    ＋ 画像追加
  </button>
</header>

<div id="list"></div>

<div id="viewer" class="viewer" onclick="closeViewer()">
  <img id="bigImg">
</div>

<script>
const file = document.getElementById("file");
const list = document.getElementById("list");
const viewer = document.getElementById("viewer");
const bigImg = document.getElementById("bigImg");

let images = [];

file.addEventListener("change", (e) => {
  const files = e.target.files;

  for (let f of files) {
    const url = URL.createObjectURL(f);
    images.push(url);
  }

  render();
});

function render() {
  list.innerHTML = "";

  images.forEach((img, i) => {
    const image = document.createElement("img");
    image.src = img;
    image.className = "thumb";

    image.onclick = () => open(img);

    let timer;

    image.addEventListener("touchstart", () => {
      timer = setTimeout(() => remove(i), 600);
    });

    image.addEventListener("touchend", () => {
      clearTimeout(timer);
    });

    image.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      remove(i);
    });

    list.appendChild(image);
  });
}

function open(img) {
  bigImg.src = img;
  viewer.style.display = "flex";
}

function closeViewer() {
  viewer.style.display = "none";
}

function remove(i) {
  if (confirm("削除しますか？")) {
    images.splice(i, 1);
    render();
  }
}
</script>

</body>
</html>
